<!doctype html>
<html>
<style>
    canvas {
        background-color: lightgray;
    }

    img {
        display: none;
    }
</style>

<body onload="start()">
    <img id="beachImage" src="../img/beachBackground.jpg" />
    <canvas id="game" width="800" height="800"></canvas>
    <script>
        document.addEventListener("keydown", handleKeyDown)
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        let beachImage;
        let isRunning = true;

        let faceX = 300;
        let faceY = 300;
        let faceSpeedX = 0;
        let faceSpeedY = 0;
        let backgroundX = 0; 

        function handleKeyDown(e) {
            if (e.code == "Space") {
                faceSpeedY = -20;
            }
        }
        function start() {
            beachImage = document.getElementById("beachImage");
            gameLoop();
        }

        function gameLoop() {
            update();
            draw();
            if (isRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            updateBirdPosition();
            updateBirdSpeed();
            updateBackgroundPosition();
        }

        function updateBirdPosition() {
            faceX += faceSpeedX;
            faceY += faceSpeedY;

            // Sjekk om fuglen har truffet bakken
            let birdBottomY = faceY + 100;
            let screenBottomY = 800;

            if (birdBottomY >= screenBottomY) {
                isRunning = false;
                faceY = screenBottomY - 100;
            }
        }

        function updateBirdSpeed() {
            if (faceY > 700) {
                faceSpeedY = -faceSpeedY;
            } else {
                faceSpeedY++;
            }
        }

        function updateBackgroundPosition() {
            backgroundX--;
            if (backgroundX < -1600) {
                backgroundX = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            ctx.drawImage(beachImage, backgroundX, 0, 1600, 800);
            ctx.drawImage(beachImage, backgroundX + 1600, 0, 1600, 800);
            drawFace(faceX, faceY);
        }

        function drawFace(leftX, leftY) {
            // Hode
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(leftX, leftY, 100, 100);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#663300";
            ctx.strokeRect(leftX, leftY, 100, 100);

            let x = leftX + 50;
            let y = leftY + 50;

            // Venstre øye
            ctx.beginPath();
            ctx.fillStyle = "blue";
            ctx.arc(x - 20, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Høyre øye
            ctx.beginPath();
            ctx.arc(x + 20, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Munn
            ctx.beginPath();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.arc(x, y + 10, 25, 0, Math.PI);
            ctx.stroke();
        }
    </script>
</body>

</html>
