<!doctype html>
<html>
<style>
    canvas {
        background-color: lightgray;
    }

    img {
        display: none;
    }
</style>

<body onload="start()">
    <img id="beachImage" src="../img/beachBackground.jpg" />
    <canvas id="game" width="800" height="800"></canvas>
    <script>
        document.addEventListener("keydown", handleKeyDown);
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        let beachImage;
        let isRunning = false;
        let hasPlayed = false;

        // disse endrer verdi
        let birdX;
        let birdY;
        let birdSpeedY;
        let pipeX;
        let backgroundX;
        let score;
        let startTime;
        let frameCount;
        let pipeSpeed;

        // disse endrer ikke verdi
        let birdSpeedX = 0;
        let birdWidth = 100;
        let birdHeight = 100;
        let pipeWidth = 150;
        let pipeHeight = 200;
        let framesBeforeIncreasePipeSpeed = 300;

        function handleKeyDown(e) {
            if (e.code == "Space") {
                if (isRunning) {
                    birdSpeedY = -20;
                } else {
                    isRunning = true;
                    hasPlayed = true;
                    start();
                }
            }
        }
        function start() {
            beachImage = document.getElementById("beachImage");
            birdX = 300;
            birdY = 300;
            birdSpeedY = 0;
            pipeX = 770;
            backgroundX = 0;
            score = 0;
            startTime = new Date().getTime();
            frameCount = 0;
            pipeSpeed = 4;
            gameLoop();
        }

        function gameLoop() {
            frameCount++;
            if (frameCount % framesBeforeIncreasePipeSpeed == 0) {
                pipeSpeed++;
            }
            update();
            draw();
            if (isRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            if (isRunning) score += 0.03;
            updateBirdPosition();
            updateBirdSpeed();
            updateBackgroundPosition();
            updatePipePosition();
            checkCollision(0, pipeHeight);
            checkCollision(800 - pipeHeight, 800);
        }

        function checkCollision(pipeTopY, pipeBottomY) {
            let birdLeftX = birdX;
            let birdRightX = birdX + birdWidth;
            let birdTopY = birdY;
            let birdBottomY = birdY + birdHeight;

            let pipeLeftX = pipeX;
            let pipeRightX = pipeX + pipeWidth;

            let birdIsLeft = birdRightX < pipeLeftX;
            let birdIsRight = birdLeftX > pipeRightX;
            let birdIsBelow = birdTopY > pipeBottomY;
            let birdIsAbove = birdBottomY < pipeTopY;
            let birdIsOutsidePipe = birdIsAbove || birdIsBelow || birdIsLeft || birdIsRight;

            let isCollision = !birdIsOutsidePipe;

            if (isCollision) {
                isRunning = false;
            }
        }

        function updatePipePosition() {
            pipeX -= pipeSpeed;
            if (pipeX < -pipeWidth) {
                pipeX = 800;
            }
        }

        function updateBirdPosition() {
            birdX += birdSpeedX;
            birdY += birdSpeedY;

            // Sjekk om fuglen har truffet bakken
            let birdBottomY = birdY + birdHeight;
            let screenBottomY = 800;

            if (birdBottomY >= screenBottomY) {
                isRunning = false;
                birdY = screenBottomY - birdHeight;
            }
        }

        function updateBirdSpeed() {
            if (birdY > 700) {
                birdSpeedY = -birdSpeedY;
            } else {
                birdSpeedY++;
            }
        }

        function updateBackgroundPosition() {
            backgroundX--;
            if (backgroundX < -1600) {
                backgroundX = 0;
            }
        }

        function draw() {
            clearScreen();
            drawBackground();
            drawPipe(0);
            drawPipe(800 - pipeHeight);
            drawBird();
            drawText('Score: ' + Math.floor(score), 60, 10, 55);
            if (isRunning) {
                drawFps();                
                drawText(pipeSpeed, 60, 400, 55);
            } else {
                if (hasPlayed) {
                    drawText('Game over', 140, 50, 400);
                }
                drawText('Trykk <space> for å starte', 60, 50, 600);
            }
        }

        function drawFps() {
            let elapsedSeconds = (new Date().getTime() - startTime) / 1000;
            let fps = frameCount / elapsedSeconds;
            drawText(fps.toFixed(1), 60, 670, 55);
        }

        function drawText(text, fontSize, x, y) {
            ctx.lineWidth = "1";
            ctx.font = fontSize + "px Arial";
            ctx.fillStyle = "yellow";
            ctx.strokeStyle = 'black';
            ctx.fillText(text, x, y);
            ctx.strokeText(text, x, y);
        }

        function drawBackground() {
            ctx.drawImage(beachImage, backgroundX, 0, 1600, 800);
            ctx.drawImage(beachImage, backgroundX + 1600, 0, 1600, 800);
        }

        function clearScreen() {
            ctx.clearRect(0, 0, 800, 800);
        }

        function drawPipe(y) {
            ctx.fillStyle = "rgb(32, 192, 0)";
            ctx.fillRect(pipeX, y, pipeWidth, pipeHeight);
            ctx.lineWidth = 1;
            ctx.strokeStyle = "rgb(0, 64, 0)";
            ctx.strokeRect(pipeX, y, pipeWidth, pipeHeight);
        }

        function drawBird() {
            // Hode
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(birdX, birdY, birdWidth, birdHeight);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#663300";
            ctx.strokeRect(birdX, birdY, birdWidth, birdHeight);

            let x = birdX + 50;
            let y = birdY + 50;

            // Venstre øye
            ctx.beginPath();
            ctx.fillStyle = "blue";
            ctx.arc(x - 20, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Høyre øye
            ctx.beginPath();
            ctx.arc(x + 20, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Munn
            ctx.beginPath();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.arc(x, y + 10, 25, 0, Math.PI);
            ctx.stroke();
        }
    </script>
</body>

</html>
