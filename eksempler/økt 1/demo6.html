<!doctype html>
<html>
<style>
    canvas {
        background-color: lightgray;
    }
</style>

<body>
    <canvas id="game" width="800" height="800"></canvas>
    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");

        function drawHead(x, y) {
            ctx.beginPath();
            ctx.fillStyle = "#ffcc99";
            ctx.arc(x, y, 60, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawHair(x, y) {
            ctx.strokeStyle = "#5c4033";
            ctx.lineWidth = 6;
            ctx.lineCap = "round";

            // Venstre side
            ctx.beginPath();
            ctx.moveTo(x - 45, y - 45);
            ctx.lineTo(x - 60, y - 80);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x - 30, y - 55);
            ctx.lineTo(x - 40, y - 90);
            ctx.stroke();

            // Midten
            ctx.beginPath();
            ctx.moveTo(x - 10, y - 58);
            ctx.lineTo(x - 15, y - 100);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x + 10, y - 58);
            ctx.lineTo(x + 15, y - 95);
            ctx.stroke();

            // Høyre side
            ctx.beginPath();
            ctx.moveTo(x + 30, y - 55);
            ctx.lineTo(x + 45, y - 88);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x + 45, y - 45);
            ctx.lineTo(x + 65, y - 75);
            ctx.stroke();
        }

        function drawEye(x, y) {
            ctx.beginPath();
            ctx.fillStyle = "blue";
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMouth(x, y) {
            ctx.beginPath();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.arc(x, y + 10, 25, 0, Math.PI);
            ctx.stroke();
        }

        function drawFace(x, y) {
            drawHead(x, y);
            drawHair(x, y)
            drawEye(x - 20, y - 15);
            drawEye(x + 20, y - 15);
            drawMouth(x, y);
        }

        drawFace(150, 150);
        drawFace(400, 200);

        drawFace(150, 150);
        drawFace(400, 200);
    </script>
</body>

</html>
