<!doctype html>
<html>
<style>
    canvas {
        background-color: lightgray;
    }

    img {
        display: none;
    }
</style>

<body onload="start()">
    <img id="beachImage" src="../img/beachBackground.jpg" />
    <canvas id="game" width="800" height="800"></canvas>
    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        let beachImage;
        let isRunning = true;

        let faceX = 300;
        let faceY = 300;
        let faceSpeedX = 0;
        let faceSpeedY = 0;
        let backgroundX = 0;

        function start() {
            beachImage = document.getElementById("beachImage");
            gameLoop();
        }

        function gameLoop() {
            update();
            draw();
            if (isRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            faceX += faceSpeedX;
            faceY += faceSpeedY;

            if (faceY > 700) {
                faceSpeedY = -faceSpeedY;
            } else {
                faceSpeedY += 0.1;
            }
            console.log(faceSpeedY);
            backgroundX--;
            if (backgroundX < -1600) {
                backgroundX = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            ctx.drawImage(beachImage, backgroundX, 0, 1600, 800);
            ctx.drawImage(beachImage, backgroundX + 1600, 0, 1600, 800);
            drawFace(faceX, faceY);
        }

        function drawFace(leftX, leftY) {
            // Hode
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(leftX, leftY, 100, 100);

            let x = leftX + 50;
            let y = leftY + 50;

            if (y > 600) drawClosedEyes(x, y);
            else drawRegularEyes(x, y);

            // Munn
            ctx.beginPath();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.arc(x, y + 10, 25, 0, Math.PI);
            ctx.stroke();
        }

        function drawClosedEyes(x, y) {
            drawClosedEye(x - 20, y - 15);
            drawClosedEye(x + 20, y - 15);
        }

        function drawClosedEye(x, y) {
            ctx.font = "20px Arial";
            ctx.strokeStyle = "black";
            ctx.strokeText('x', x - 5, y + 3);
        }

        function drawRegularEyes(x, y) {
            drawRegularEye(x - 20, y - 15);
            drawRegularEye(x + 20, y - 15);
        }

        function drawRegularEye(x, y) {
            ctx.beginPath();
            ctx.fillStyle = "blue";
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
        }
    </script>
</body>

</html>
