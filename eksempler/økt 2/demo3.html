<!doctype html>
<html>
<style>
    canvas {
        background-color: lightgray;
    }

    img {
        display: none;
    }
</style>

<body onload="start()">
    <img id="beachImage" src="../img/beachBackground.jpg" />
    <canvas id="game" width="800" height="800"></canvas>
    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        let beachImage;

        let faceX = 100;
        let faceY = 100;
        let faceSpeedX = 2;
        let faceSpeedY = 0;
        let backgroundX = 0;

        function start() {
            beachImage = document.getElementById("beachImage");
            gameLoop();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            faceX += faceSpeedX;
            faceY += faceSpeedY;
            faceSpeedX -= 0.004;
            faceSpeedY += 0.004;
            backgroundX--;
            if (backgroundX < -1600) {
                backgroundX = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            ctx.drawImage(beachImage, backgroundX, 0, 1600, 800);
            ctx.drawImage(beachImage, backgroundX + 1600, 0, 1600, 800);
            drawFace(faceX, faceY);
        }

        function drawFace(x, y) {
            // Hode
            ctx.beginPath();
            ctx.fillStyle = "#ffcc99";
            ctx.arc(x, y, 60, 0, Math.PI * 2);
            ctx.fill();

            // Venstre øye
            ctx.beginPath();
            ctx.fillStyle = "blue";
            ctx.arc(x - 20, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Høyre øye
            ctx.beginPath();
            ctx.arc(x + 20, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Munn
            ctx.beginPath();
            ctx.strokeStyle = "red";
            ctx.lineWidth = 4;
            ctx.arc(x, y + 10, 25, 0, Math.PI);
            ctx.stroke();
        }
    </script>
</body>

</html>
